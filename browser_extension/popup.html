<!DOCTYPE html>
<html>
<head>
    <title>Website Risk Detector</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            width: 260px;
            padding: 15px;
            background: #f5f5f5;
        }

        h2{
            text-align: center;
            color: #333;
        }

        .risk-box{
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
        }

        .low{
            color: green;
            font-weight: bold;
        }

        .medium{
            color: orange;
            font-weight: bold;
        }

        .high{
            color: red;
            font-weight: bold;
        }

    </style>

</head>

<body>

<h2>Website Risk</h2>

<div class="risk-box">

    <p>Risk Level:</p>
    <p id="riskLevel">Checking...</p>

    <p>Risk Score:</p>
    <p id="riskScore">--</p>

</div>

<script src="popup.js"></script>

</body>
</html>
